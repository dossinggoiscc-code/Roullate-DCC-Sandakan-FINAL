<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Roulette</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .roulette-container {
            position: relative;
            width: 450px;
            height: 450px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff4444;
            z-index: 10;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
        }

        svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 0 10px #333;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            transition: transform 0.2s, opacity 0.2s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
        }

        .spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-display {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
        }

        .glowing-mystery {
            color: #ffd700;
            text-shadow: 0 0 10px #fff, 0 0 20px #ffd700, 0 0 30px #ffaa00, 0 0 40px #ffaa00;
            animation: pulse-glow 1.5s infinite alternate;
            display: inline-block;
        }

        @keyframes pulse-glow {
            from { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255,215,0,0.6)); }
            to { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(255,215,0,1)); }
        }
    </style>
</head>
<body>

    <h1>Spin the Wheel!</h1>

    <div class="roulette-container">
        <div class="pointer"></div>
        <svg id="wheel" viewBox="0 0 500 500"></svg>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN</button>

    <div class="result-display" id="result">Press SPIN to test your luck!</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const svg = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            const resultDisplay = document.getElementById('result');

            const items = [
                { label: "YONO coaster", weight: 20, color: "#1e3d59" },
                { label: "hand fan", weight: 15, color: "#17b978" },
                { label: "battery fan", weight: 10, color: "#ff8c94" },
                { label: "bag pack", weight: 5, color: "#a8df8e" },
                { label: "🎁 MYSTERY 🎁", weight: 1, color: "#8a2be2" }
            ];

            const totalSegments = items.reduce((sum, item) => sum + item.weight, 0);
            let currentRotation = 0;
            let isSpinning = false;

            // Generate SVG paths dynamically
            let cumulativeAngle = 0;
            items.forEach((item) => {
                const angleSize = (item.weight / totalSegments) * 360;
                
                // Calculate wedge coordinates
                const radStart = ((cumulativeAngle - 90) * Math.PI) / 180;
                const radEnd = ((cumulativeAngle + angleSize - 90) * Math.PI) / 180;
                
                const x1 = 250 + 250 * Math.cos(radStart);
                const y1 = 250 + 250 * Math.sin(radStart);
                const x2 = 250 + 250 * Math.cos(radEnd);
                const y2 = 250 + 250 * Math.sin(radEnd);
                
                const largeArcFlag = angleSize > 180 ? 1 : 0;
                const pathData = `M 250 250 L ${x1} ${y1} A 250 250 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;

                // Create SVG Path Element
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathData);
                path.setAttribute("fill", item.color);
                path.setAttribute("stroke", "#222");
                path.setAttribute("stroke-width", "2");
                svg.appendChild(path);

                // Create Text Element
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                const textAngle = cumulativeAngle + angleSize / 2;
                text.setAttribute("x", "460");
                text.setAttribute("y", "255");
                text.setAttribute("transform", `rotate(${textAngle}, 250, 250)`);
                text.setAttribute("text-anchor", "end");
                text.setAttribute("fill", item.label.includes("MYSTERY") ? "#ffd700" : "#ffffff");
                text.setAttribute("style", `font-weight: bold; font-family: sans-serif; font-size: ${item.label.includes("MYSTERY") ? '16px' : '14px'}`);
                text.textContent = item.label;
                svg.appendChild(text);

                cumulativeAngle += angleSize;
            });

            // Center Pin Accent
            const centerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            centerCircle.setAttribute("cx", "250");
            centerCircle.setAttribute("cy", "250");
            centerCircle.setAttribute("r", "20");
            centerCircle.setAttribute("fill", "#ffffff");
            centerCircle.setAttribute("stroke", "#333");
            centerCircle.setAttribute("stroke-width", "3");
            svg.appendChild(centerCircle);

            function spinWheel() {
                if (isSpinning) return;

                isSpinning = true;
                spinBtn.disabled = true;
                resultDisplay.innerHTML = "Spinning...";
                resultDisplay.className = "result-display";

                const extraRotations = (6 + Math.floor(Math.random() * 5)) * 360;
                const randomTargetAngle = Math.floor(Math.random() * 360);
                
                currentRotation += extraRotations + randomTargetAngle;
                svg.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    calculateWinner();
                }, 4000);
            }

            function calculateWinner() {
                // Determine absolute visual resting angle against the stationary top pointer
                const stopAngle = (360 - (currentRotation % 360)) % 360;
                
                let checkAngle = 0;
                let winner = null;

                for (let i = 0; i < items.length; i++) {
                    const angleSize = (items[i].weight / totalSegments) * 360;
                    if (stopAngle >= checkAngle && stopAngle < checkAngle + angleSize) {
                        winner = items[i];
                        break;
                    }
                    checkAngle += angleSize;
                }

                if (winner) {
                    if (winner.label.includes("MYSTERY")) {
                        resultDisplay.innerHTML = `🎉 AMAZING LUCK! You won: <span class="glowing-mystery">${winner.label}</span> 🎉`;
                    } else {
                        resultDisplay.innerHTML = `You won: <strong>${winner.label}</strong>`;
                    }
                }
            }

            spinBtn.addEventListener('click', spinWheel);
        });
    </script>
</body>
</html>
