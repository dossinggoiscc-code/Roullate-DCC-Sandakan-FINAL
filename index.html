<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Roulette</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .roulette-container {
            position: relative;
            width: 450px;
            height: 450px;
        }

        /* The Pointer Arrow */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff4444;
            z-index: 10;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 0 10px #333;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            transition: transform 0.2s, opacity 0.2s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
        }

        .spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Result Popup & Glowing Mystery Effect */
        .result-display {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
        }

        /* The Glowing Mystery Effect requested */
        .glowing-mystery {
            color: #ffd700;
            text-shadow: 0 0 10px #fff, 0 0 20px #ffd700, 0 0 30px #ffaa00, 0 0 40px #ffaa00;
            animation: pulse-glow 1.5s infinite alternate;
        }
